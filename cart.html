<main class="cart-container">
    <h2>Твоята количка</h2>
    
    <div id="cart-items-list"></div>

    <div class="cart-footer" id="cart-summary">
        <p>Обща сума: <span class="total-price" id="cart-total">0.00 €</span></p>
        <button class="checkout-btn" id="show-checkout-btn">Завърши поръчката</button>
    </div>

    <div id="checkout-section" class="hidden">
        <div class="checkout-box">
            <h1></h1>
            <form id="checkout-form">
                <div class="input-group">
                    <label>въведете трите си имена</label>
                    <input type="text" id="first-name" placeholder="Име" required>
                </div>
                <div class="input-group">
                    <label>въведете имейла си</label>
                    <input type="email" id="email" placeholder="имейл" required>
                </div>
                
                <div class="input-group">
                    <label>въведете телефонен номер</label>
                    <input type="tel" id="phone"  placeholder="телефонен номер"required >
                </div>
                <div class="input-group">
                    <label>въведете населено място</label>
                    <input type="text" id="city"  placeholder="населено място"required >
                </div>
                
                <div class="input-group">
                    <label>въведете адрес</label>
                    <input type="text" id="address" placeholder="адрес" required>
                </div>
                
                <button type="submit" class="pay-btn">Button</button>
            </form>
        </div>
    </div>

    <a href="homepage.html" class="back-link">← Обратно към магазина</a>
